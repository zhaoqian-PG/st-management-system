# ============================================================
# Test Profile - H2 In-Memory Database
# ============================================================
# Overrides production PostgreSQL settings so integration tests
# run against a fast, disposable in-memory database.
# All DDL is auto-generated from JPA entities — no schema.sql needed.
# Employee test data is inserted via JdbcTemplate in @BeforeEach
# to work around the employee_code insertable=false constraint.
# ============================================================

spring.datasource.url=jdbc:h2:mem:testdb;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DATABASE_TO_LOWER=TRUE;NON_KEYWORDS=MONTH,YEAR,VALUE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.defer-datasource-initialization=true
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false

# Jackson (same as production)
spring.jackson.date-format=yyyy-MM-dd HH:mm:ss
spring.jackson.time-zone=Asia/Shanghai

# Logging — quiet during tests
logging.level.com.stmanagement=WARN
logging.level.org.springframework=WARN
