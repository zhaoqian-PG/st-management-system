# 🛠️ JPA / Hibernate（已针对云端/高版本进行优化）
# 1. 建议改为更通用的 PostgreSQLDialect，防止因版本方言问题导致线上某些特有语法报错
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
# 2. 🔑 关键：既然已经在 A5M2 里导入了完好的表结构，线上环境强烈建议改为 validate（只验证不修改）
# 如果保持 update，JPA 可能会因为线上和本地的某些微小差异误删或误改线上表结构
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

# File Upload
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=50MB

# Jackson
spring.jackson.date-format=yyyy-MM-dd HH:mm:ss
spring.jackson.time-zone=Asia/Shanghai

# Logging
logging.level.com.stmanagement=DEBUG
logging.level.org.springframework.web=INFO
